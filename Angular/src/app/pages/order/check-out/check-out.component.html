<div class="container mt-5">

  <h2 class="mb-4">Checkout</h2>

  <div *ngIf="cartItems.length === 0" class="alert alert-info">
    Your cart is empty
  </div>

  <div *ngIf="cartItems.length > 0">

    <table class="table table-bordered align-middle list">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Product</th>
          <th>Size</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of cartItems">

          <td>
            <img [src]="item.image" width="70" class="rounded">
          </td>

          <td>{{item.name}}</td>

          <td>{{item.size}}</td>

          <td>{{item.price | currency}}</td>

          <td>{{item.quantity}}</td>

          <td>{{item.price * item.quantity | currency}}</td>

          <td>
            <button class="btn btn-danger btn-sm"
                    (click)="removeItem(item)">
              Remove
            </button>
          </td>

        </tr>
      </tbody>
    </table>

    <div class="d-flex justify-content-between mt-4">

      <h4>
        Total:
        <span class="text-success">
          {{getTotal() | currency}}
        </span>
      </h4>

      
    </div>
 <form [formGroup]="form" (ngSubmit)="createOrder()">

   <div class="mb-3">
     <label for="shippingAddress" class="form-label">Shipping Address</label>
     <input type="text" id="shippingAddress" formControlName="shippingAddress" class="form-control">
   </div>

   <div class="mb-3">
     <label for="email" class="form-label">Email Address</label>
     <input type="email" id="email" formControlName="email" class="form-control">
   </div>

   <div class="mb-3">
     <label for="phoneNumber" class="form-label">Phone Number</label>
     <input type="text" id="phoneNumber" formControlName="phoneNumber" class="form-control">
   </div>

   <button type="submit" class="btn btn-primary " [disabled]="form.invalid">Place Order</button>
 </form>
  </div>

</div>
